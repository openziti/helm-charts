---
apiVersion: v1
kind: Secret
metadata:
    name: {{ include "zrok2.fullname" . }}-ziggy-account-password
    labels:
        {{- include "zrok2.labelsController" . | nindent 8 }}
type: Opaque
data:
    # retrieve the secret data using lookup function and when not exists, return an empty dictionary / map as result
    {{- $ziggySecretObj := (lookup "v1" "Secret" .Release.Namespace (printf "%s-%s" (include "zrok2.fullname" . ) "ziggy-account-password")) | default dict }}
    {{- $ziggySecretData := (get $ziggySecretObj "data") | default dict }}
    {{- $ziggyPassword := (get $ziggySecretData "password") | default (randAlphaNum 32 | b64enc) }}
    # set the secret values..
    username: {{ printf "ziggy@%s" .Values.dnsZone | b64enc | quote }}
    password: {{ $ziggyPassword | quote }}

---
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ include "zrok2.fullname" . }}-frontend-config
    labels:
        {{- include "zrok2.labelsFrontend" . | nindent 8 }}
data:
    bootstrap-frontend.bash: |-
        #!/usr/bin/env bash

        set -o errexit
        set -o nounset
        set -o pipefail
        # set -o xtrace

        # source utility functions (info, warn, error, die, retry, wait_for)
        # from the zrok2 image; the source guard prevents main() from running
        source /usr/local/bin/zrok2-bootstrap

        # mounted script from frontend configmap
        zitiLogin

        getZitiPublicFrontend(){
            local RETURNED
            local -A FIELDS
            FIELDS[all]=0
            FIELDS[zid]=1
            FIELDS[name]=2
            FIELDS[type]=3
            FIELDS[attributes]=4
            FIELDS[policy]=5

            if (( $# )); then
                RETURNED="$1"
                shift
            else
                RETURNED="all"
            fi

            if (( $# )); then
                warn "ignoring unexpected parameters: $*"
            fi

            if [[ -z "${FIELDS[$RETURNED]}" ]]; then
                error "invalid return field $RETURNED"
                return 1
            fi

            ziti edge list identities 'name="public"' --csv \
                | awk -F, '$'${FIELDS[name]}'=="public" {print $'${FIELDS[$RETURNED]}';}'
        }

        # find Ziti ID of default "public" frontend — poll until created
        _check_ziti_public_id() {
            ZITI_PUBLIC_ID="$(getZitiPublicFrontend zid)"
            [[ -n "${ZITI_PUBLIC_ID}" ]]
        }
        ZITI_PUBLIC_ID=""
        wait_for 120 3 "Ziti 'public' identity" _check_ziti_public_id
        info "'public' ZITI_PUBLIC_ID=$ZITI_PUBLIC_ID"

        wait_for 120 3 "zrok2 controller API" \
            curl -sSf "${ZROK2_API_ENDPOINT}/api/v1/version"

        getZrokPublicFrontend(){
            local RETURNED
            local -A FIELDS
            # awk field positions in │-delimited table output:
            # │(1) token(2) │(3) zid(4) │(5) name(6) │(7) ...
            FIELDS[all]=0
            FIELDS[token]=2
            FIELDS[zid]=4
            FIELDS[name]=6
            FIELDS[template]=8
            FIELDS[created]=10
            FIELDS[updated]=12

            if (( $# )); then
                RETURNED="$1"
                shift
            else
                RETURNED="all"
            fi

            if (( $# )); then
                warn "ignoring unexpected parameters: $*"
            fi

            if [[ -z "${FIELDS[$RETURNED]}" ]]; then
                error "invalid return field $RETURNED"
                return 1
            fi

            # strip ANSI sequences and return the field from the line with a name exactly matching "public"
            zrok2 admin list frontends | sed 's/\x1b\[[0-9;]*m//g' \
            | awk '$'${FIELDS[name]}'=="public" {print $'${FIELDS[$RETURNED]}'}'
        }

        # if default "public" frontend already exists
        ZROK2_PUBLIC_TOKEN=$(getZrokPublicFrontend token)
        if [[ -n "${ZROK2_PUBLIC_TOKEN}" ]]; then

            # ensure the Ziti ID of the public frontend's identity is the same in Ziti and zrok2
            ZROK2_PUBLIC_ZID=$(getZrokPublicFrontend zid)
            if [[ "${ZITI_PUBLIC_ID}" != "${ZROK2_PUBLIC_ZID}" ]]; then
                die "existing Ziti Identity named 'public' with id '$ZITI_PUBLIC_ID' is from a previous zrok2" \
                    "instance life cycle. Delete it then re-run zrok2."
            fi

            info "updating frontend"
            zrok2 admin update frontend "${ZROK2_PUBLIC_TOKEN}" \
                --url-template "{{ .Values.frontend.ingress.scheme }}://{token}.{{ .Values.dnsZone }}"
        else
            info "creating frontend"
            zrok2 admin create frontend -- "${ZITI_PUBLIC_ID}" public \
                "{{ .Values.frontend.ingress.scheme }}://{token}.{{ .Values.dnsZone }}"
        fi

        # ensure the "public" namespace exists and is mapped to the frontend
        ZROK2_PUBLIC_TOKEN=$(getZrokPublicFrontend token)
        if zrok2 admin list namespaces 2>/dev/null \
            | sed 's/\x1b\[[0-9;]*m//g' \
            | awk '$1=="public" {found=1} END {exit !found}'; then
            info "namespace 'public' already exists"
        else
            info "creating namespace 'public'"
            zrok2 admin create namespace --token public --open {{ .Values.dnsZone | quote }}
            info "mapping namespace 'public' to frontend '${ZROK2_PUBLIC_TOKEN}'"
            zrok2 admin create namespace-frontend public "${ZROK2_PUBLIC_TOKEN}" --default
        fi

        # granted permission to read secrets in namespace by SA managed by this chart
        if kubectl -n {{ .Release.Namespace }} get secret \
            {{ include "zrok2.fullname" . }}-ziggy-account-token &>/dev/null; then
            info "ziggy account enable token secret exists"
        else
            info "ziggy account enable token secret does not exist, creating secret"
            # create a default user account named "ziggy" and save the enable token in a Secret resource
            zrok2 admin create account \
                ziggy@{{ .Values.dnsZone }} \
                {{ $ziggyPassword | b64dec | quote }} \
            | xargs -I TOKEN kubectl -n {{ .Release.Namespace }} create secret generic \
                {{ include "zrok2.fullname" . }}-ziggy-account-token \
                --from-literal=token=TOKEN
            # xargs -r is NOT used here because this command must fail loudly if the account token was not created

        fi

    frontend.yaml: |-
        #    _____ __ ___ | | __
        #   |_  / '__/ _ \| |/ /
        #    / /| | | (_) |   <
        #   /___|_|  \___/|_|\_\
        # zrok2 frontend configuration
        v: 4
        host_match: {{ .Values.dnsZone | quote }}
        address: 0.0.0.0:{{ .Values.frontend.service.containerPort }}
        {{- if .Values.frontend.extraConfig }}
        {{ toYaml .Values.frontend.extraConfig }}
        {{- end }}

    unbootstrap.bash: |-
        #!/usr/bin/env bash
        set -o errexit
        set -o nounset
        set -o pipefail
        # set -o xtrace

        # source utility functions (info, warn, error, die, retry, wait_for)
        # from the zrok2 image; the source guard prevents main() from running
        source /usr/local/bin/zrok2-bootstrap

        if kubectl -n {{ .Release.Namespace }} get secret \
            {{ include "zrok2.fullname" . }}-frontend-identity &>/dev/null
        then
            kubectl -n {{ .Release.Namespace }} delete secret \
                {{ include "zrok2.fullname" . }}-frontend-identity
            info "deleted default 'public' frontend identity."
        else
            info "default 'public' frontend identity secret does not exist."
        fi

        if kubectl -n {{ .Release.Namespace }} get secret \
            {{ include "zrok2.fullname" . }}-ziggy-account-token &>/dev/null
        then
            kubectl -n {{ .Release.Namespace }} delete secret \
                {{ include "zrok2.fullname" . }}-ziggy-account-token
            info "deleted ziggy account enable token secret"
        else
            info "ziggy account enable token secret doesn't exist"
        fi

        set +o errexit
        zitiLogin

        zrok2 admin unbootstrap /etc/zrok2/ctrl.yaml

    zitiLogin: |-
        #!/usr/bin/env bash
        set -o errexit
        set -o nounset
        set -o pipefail
        # set -o xtrace

        ziti edge login "${ZITI_MGMT_API}" \
            --username "${ZITI_ADMIN_USER}" \
            --password "${ZITI_ADMIN_PASSWORD}" \
            --ca "{{ .Values.ziti.ca_cert_dir }}/{{ .Values.ziti.ca_cert_file }}"
