# this manifest contains the secrets and configmaps used by the zrok2 controller

---
apiVersion: v1
kind: Secret
metadata:
    name: {{ include "zrok2.fullname" . }}-admin-secret
    labels:
        {{- include "zrok2.labelsController" . | nindent 8 }}
type: Opaque
data:
    # retrieve the secret data using lookup function and when not exists, return an empty dictionary / map as result
    {{- $zrok2SecretObj := (lookup "v1" "Secret" .Release.Namespace (printf "%s-%s" (include "zrok2.fullname" . ) "admin-secret")) | default dict }}
    {{- $zrok2SecretData := (get $zrok2SecretObj "data") | default dict }}
    # set $zrok2AdminToken to existing secret data or generate a random one when not exists
    {{- $zrok2AdminToken := (get $zrok2SecretData "admin-token") | default (randAlphaNum 32 | b64enc) }}
    # set the secret values..
    admin-token: {{ $zrok2AdminToken | quote }}

---
apiVersion: v1
kind: Secret
metadata:
    name: {{ include "zrok2.fullname" . }}-ziti-mgmt-secret
    labels:
        {{- include "zrok2.labelsController" . | nindent 8 }}
type: Opaque
data:
    # set the secret values..
    admin-username: {{ .Values.ziti.username | b64enc | quote }}
    admin-password: {{ .Values.ziti.password | b64enc | quote }}

---
apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ include "zrok2.fullname" . }}-config
    labels:
        {{- include "zrok2.labelsController" . | nindent 8 }}
{{- /* Resolve RabbitMQ URL from values or existing Secret */}}
{{- $rabbit := dict "url" "" }}
{{- if and .Values.rabbitmq .Values.rabbitmq.existingSecret .Values.rabbitmq.existingSecret.name .Values.rabbitmq.existingSecret.key }}
{{- $rabbitSecretObj := (lookup "v1" "Secret" .Release.Namespace .Values.rabbitmq.existingSecret.name) | default dict }}
{{- $rabbitSecretData := (get $rabbitSecretObj "data") | default dict }}
{{- $rabbitUrlFromSecret := (get $rabbitSecretData .Values.rabbitmq.existingSecret.key | default "") | b64dec }}
{{- if $rabbitUrlFromSecret }}
{{- $_ := set $rabbit "url" $rabbitUrlFromSecret }}
{{- end }}
{{- end }}
{{- if and .Values.rabbitmq .Values.rabbitmq.url }}
{{- $_ := set $rabbit "url" .Values.rabbitmq.url }}
{{- end }}
{{- /* Resolve InfluxDB settings (url, bucket, org, token) from values or existing Secret */}}
{{- $influx := dict "url" "" "bucket" "" "org" "" "token" "" }}
{{- if and .Values.influxdb .Values.influxdb.existingSecret .Values.influxdb.existingSecret.name }}
{{- $influxSecretObj := (lookup "v1" "Secret" .Release.Namespace .Values.influxdb.existingSecret.name) | default dict }}
{{- $influxSecretData := (get $influxSecretObj "data") | default dict }}
{{- if .Values.influxdb.existingSecret.urlKey }}
{{- $influxUrlFromSecret := (get $influxSecretData .Values.influxdb.existingSecret.urlKey | default "") | b64dec }}
{{- if $influxUrlFromSecret }}
{{- $_ := set $influx "url" $influxUrlFromSecret }}
{{- end }}
{{- end }}
{{- if .Values.influxdb.existingSecret.bucketKey }}
{{- $influxBucketFromSecret := (get $influxSecretData .Values.influxdb.existingSecret.bucketKey | default "") | b64dec }}
{{- if $influxBucketFromSecret }}
{{- $_ := set $influx "bucket" $influxBucketFromSecret }}
{{- end }}
{{- end }}
{{- if .Values.influxdb.existingSecret.orgKey }}
{{- $influxOrgFromSecret := (get $influxSecretData .Values.influxdb.existingSecret.orgKey | default "") | b64dec }}
{{- if $influxOrgFromSecret }}
{{- $_ := set $influx "org" $influxOrgFromSecret }}
{{- end }}
{{- end }}
{{- if .Values.influxdb.existingSecret.tokenKey }}
{{- $influxTokenFromSecret := (get $influxSecretData .Values.influxdb.existingSecret.tokenKey | default "") | b64dec }}
{{- if $influxTokenFromSecret }}
{{- $_ := set $influx "token" $influxTokenFromSecret }}
{{- end }}
{{- end }}
{{- end }}
{{- if and .Values.influxdb .Values.influxdb.url }}
{{- $_ := set $influx "url" .Values.influxdb.url }}
{{- end }}
{{- if and .Values.influxdb .Values.influxdb.bucket }}
{{- $_ := set $influx "bucket" .Values.influxdb.bucket }}
{{- end }}
{{- if and .Values.influxdb .Values.influxdb.org }}
{{- $_ := set $influx "org" .Values.influxdb.org }}
{{- end }}
{{- if and .Values.influxdb .Values.influxdb.token }}
{{- $_ := set $influx "token" .Values.influxdb.token }}
{{- end }}
data:
    # idempotent bootstrap script runs as init container before zrok2 controller
    bootstrap-ziti.bash: |-
        #!/usr/bin/env bash
        set -o errexit
        set -o nounset
        set -o pipefail
        # set -o xtrace

        # source utility functions (info, warn, error, die, retry, wait_for)
        # from the zrok2 image; the source guard prevents main() from running
        source /usr/local/bin/zrok2-bootstrap

        # uses mounted zrok2 config YAML; skip if already bootstrapped
        # (the public identity file is created by zrok2 admin bootstrap).
        # bootstrap is not idempotent — it panics if the Ziti 'public'
        # identity already exists (e.g. from a concurrent pod or prior
        # install).  Tolerate failure if public.json was created by another
        # pod or a previous run.
        if [[ -f "${HOME}/.zrok2/identities/public.json" ]]; then
            info "zrok2 already bootstrapped (public.json exists on PVC)"
        else
            retry 3 5 "zrok2 admin bootstrap" \
                zrok2 admin bootstrap /etc/zrok2/ctrl.yaml \
            || {
                # Another pod may have completed bootstrap concurrently
                if [[ -f "${HOME}/.zrok2/identities/public.json" ]]; then
                    info "bootstrap failed but public.json exists (concurrent bootstrap succeeded)"
                else
                    die "zrok2 admin bootstrap failed and no public.json found"
                fi
            }
        fi

        # granted permission to read secrets in namespace by SA managed by this chart
        if kubectl -n {{ .Release.Namespace }} get secret \
            {{ include "zrok2.fullname" . }}-frontend-identity &>/dev/null; then
            info "frontend identity secret exists"
        else
            info "frontend identity secret does not exist, creating secret"

            # granted permission to create secrets in this namespace by SA managed by this chart
            kubectl -n {{ .Release.Namespace }} create secret generic \
                {{ include "zrok2.fullname" . }}-frontend-identity \
                --from-file=public.json="${HOME}/.zrok2/identities/public.json"
        fi

        {{- if get $rabbit "url" }}
        # ── dynamicProxyController identity and Ziti resources ───────────────
        #
        # The DPC provides real-time AMQP-based mapping updates to the frontend
        # for named public shares.  We create the identity, Ziti service, and
        # policies only if the DPC identity secret does not already exist.

        info "ensuring dynamicProxyController identity and Ziti resources"

        # Create a minimal config for the temp controller — strip DPC,
        # bridge, and metrics sections since the DPC identity doesn't
        # exist yet and those features aren't needed for admin commands.
        TEMP_CTRL="/tmp/ctrl-bootstrap.yaml"
        awk '
            /^(dynamic_proxy_controller|bridge|metrics):/ { skip=1; next }
            /^[^[:space:]#]/ { skip=0 }
            !skip
        ' /etc/zrok2/ctrl.yaml > "${TEMP_CTRL}"

        # Start a temporary controller for admin API calls
        zrok2 controller "${TEMP_CTRL}" &
        CTRL_PID=$!
        cleanup_ctrl() { kill "$CTRL_PID" 2>/dev/null; wait "$CTRL_PID" 2>/dev/null || true; }
        trap cleanup_ctrl EXIT

        export ZROK2_API_ENDPOINT="http://127.0.0.1:{{ .Values.controller.service.containerPort }}"

        wait_for 60 3 "zrok2 controller API" \
            curl -sSf "${ZROK2_API_ENDPOINT}/api/v1/version"

        # Create the DPC identity via zrok2 admin (creates + enrolls the
        # Ziti identity and writes the config JSON to $HOME/.zrok2/identities/).
        if [[ ! -f "${HOME}/.zrok2/identities/dynamicProxyController.json" ]]; then
            zrok2 admin create identity dynamicProxyController
        else
            info "dynamicProxyController identity already exists on PVC"
        fi

        # Login to Ziti for service/policy creation
        ziti edge login "${ZITI_MGMT_API}" \
            --username "${ZITI_ADMIN_USER}" \
            --password "${ZITI_ADMIN_PASSWORD}" \
            --ca "{{ .Values.ziti.ca_cert_dir }}/{{ .Values.ziti.ca_cert_file }}"

        # Get the Ziti ID of the DPC identity
        CONTROLLER_ZID=$(ziti edge list identities \
            'name="dynamicProxyController"' -j 2>/dev/null \
            | jq -r '.data[0].id // empty' 2>/dev/null || true)

        if [[ -z "${CONTROLLER_ZID}" ]]; then
            warn "could not find dynamicProxyController Ziti ID"
        else
            info "dynamicProxyController Ziti ID: $CONTROLLER_ZID"
            SERVICE_NAME="dynamicProxyController"

            # Create Ziti service (idempotent)
            if ! ziti edge list services "name=\"${SERVICE_NAME}\"" -j 2>/dev/null \
                | jq -e '.data | length > 0' &>/dev/null; then
                ziti edge create service "$SERVICE_NAME"
            fi

            # Create Service Edge Router Policy
            if ! ziti edge list service-edge-router-policies \
                "name=\"${SERVICE_NAME}-serp\"" -j 2>/dev/null \
                | jq -e '.data | length > 0' &>/dev/null; then
                ziti edge create serp "${SERVICE_NAME}-serp" \
                    --edge-router-roles '#all' \
                    --service-roles "@${SERVICE_NAME}"
            fi

            # Create Bind policy (controller binds the service)
            if ! ziti edge list service-policies \
                "name=\"${SERVICE_NAME}-bind\"" -j 2>/dev/null \
                | jq -e '.data | length > 0' &>/dev/null; then
                ziti edge create sp "${SERVICE_NAME}-bind" Bind \
                    --identity-roles "@${CONTROLLER_ZID}" \
                    --service-roles "@${SERVICE_NAME}"
            fi

            # Create Dial policy (frontend dials the service)
            if ! ziti edge list service-policies \
                "name=\"${SERVICE_NAME}-dial\"" -j 2>/dev/null \
                | jq -e '.data | length > 0' &>/dev/null; then
                ziti edge create sp "${SERVICE_NAME}-dial" Dial \
                    --identity-roles '@public' \
                    --service-roles "@${SERVICE_NAME}"
            fi
        fi

        # Stop temporary controller
        cleanup_ctrl
        trap - EXIT
        {{- end }}

    test.bash: |-
        #!/usr/bin/env bash
        set -o errexit
        set -o nounset
        set -o pipefail
        set -o xtrace

        cleanup() {
            [[ -n "${SHARE_PID:-}" ]] && kill "$SHARE_PID" 2>/dev/null || true
            [[ -n "${ENDPOINT_PID:-}" ]] && kill "$ENDPOINT_PID" 2>/dev/null || true
            zrok2 disable 2>/dev/null || true
        }
        trap cleanup EXIT

        zrok2 enable --headless --description "{{ include "zrok2.fullname" . }} test run" "${ZROK2_ENABLE_TOKEN}"

        # ── Test 1: Canary looper (random shares via Ziti overlay) ──────
        # Non-fatal: the canary goes through the public ingress which may
        # not have valid TLS certs in test environments.
        ZROK2_DANGEROUS_CANARY=1 zrok2 test canary public-proxy || echo "WARN: canary test failed (non-fatal)"

        {{- if or (and .Values.rabbitmq .Values.rabbitmq.url) (and .Values.rabbitmq .Values.rabbitmq.existingSecret) }}
        # ── Test 2: Named share via AMQP-backed dynamic frontend ────────
        SHARE_NAME="citest-$(date +%s)"
        DNS_ZONE={{ .Values.dnsZone | quote }}
        FRONTEND_PORT={{ .Values.frontend.service.advertisedPort }}
        FRONTEND_SVC="{{ include "zrok2.fullname" . }}-frontend.{{ .Release.Namespace }}.svc"

        # Start a backend HTTP endpoint
        zrok2 test endpoint --port 19999 &
        ENDPOINT_PID=$!
        sleep 2

        # Pre-create the name
        zrok2 create name "${SHARE_NAME}"

        # Create a named share pointing at the test endpoint
        zrok2 share public http://127.0.0.1:19999 \
            --name-selection "public:${SHARE_NAME}" \
            --headless &
        SHARE_PID=$!

        # Wait for the share to propagate via AMQP to the dynamic frontend
        DEADLINE=$((SECONDS + 60))
        SHARE_FOUND=0
        while (( SECONDS < DEADLINE )); do
            HTTP_CODE=$(curl -sSo /dev/null -w '%{http_code}' --max-time 5 \
                -H "Host: ${SHARE_NAME}.${DNS_ZONE}" \
                "http://${FRONTEND_SVC}:${FRONTEND_PORT}/" 2>/dev/null || true)
            if [[ "${HTTP_CODE}" == "200" ]]; then
                SHARE_FOUND=1
                break
            fi
            echo "waiting for named share ${SHARE_NAME} (HTTP ${HTTP_CODE})..."
            sleep 3
        done

        if (( ! SHARE_FOUND )); then
            echo "ERROR: named share ${SHARE_NAME} not accessible after 60s" >&2
            exit 1
        fi

        echo "named share ${SHARE_NAME} verified (HTTP 200)"

        # Cleanup share
        kill "$SHARE_PID" 2>/dev/null || true
        SHARE_PID=""
        kill "$ENDPOINT_PID" 2>/dev/null || true
        ENDPOINT_PID=""
        {{- end }}

    ctrl.yaml: |-
        #    _____ __ ___ | | __
        #   |_  / '__/ _ \| |/ /
        #    / /| | | (_) |   <
        #   /___|_|  \___/|_|\_\
        # zrok2 controller configuration
        #

        v: 4

        admin:
            secrets:
                - {{ $zrok2AdminToken | b64dec | quote }}

        endpoint:
            host:             0.0.0.0
            port:             {{ .Values.controller.service.containerPort }}

        # Configure the controller database.
        store:
            path:                           {{ include "zrok2.storePath" . | quote }}
            type:                           {{ include "zrok2.storeType" . | quote }}

        # Ziti configuration.
        ziti:
            api_endpoint:     https://{{ .Values.ziti.advertisedHost }}:{{ .Values.ziti.advertisedPort }}
            username:         {{ .Values.ziti.username | quote }}
            password:         {{ .Values.ziti.password | quote }}

        {{- if get $rabbit "url" }}
        # Dynamic proxy controller — provides real-time AMQP-based mapping
        # updates to the frontend for named public shares.
        dynamic_proxy_controller:
            identity_path: {{ .Values.controller.persistence.mount_dir }}/.zrok2/identities/dynamicProxyController.json
            service_name: dynamicProxyController
            amqp_publisher:
                url:            {{ get $rabbit "url" | quote }}
                exchange_name:  dynamicProxy
        {{- end }}

        # NOTE: No bridge: section is needed in Kubernetes. The Ziti controller
        # publishes fabric.usage events directly to AMQP via its native event
        # handler (additionalConfigs.events in the ziti-controller chart).
        # The zrok2 controller reads from the same AMQP queue via amqpSource.

        {{- if and (get $rabbit "url") (get $influx "url") }}
        metrics:
            agent:
                source:
                    type:               amqpSource
                    url:                {{ get $rabbit "url" | quote }}
                    queue_name:         events
            influx:
                url:            {{ get $influx "url" | quote }}
                bucket:         {{ get $influx "bucket" }}
                org:            {{ get $influx "org" }}
                {{- if get $influx "token" }}
                token:          {{ get $influx "token" | quote }}
                {{- end }}
        {{- end }}

        maintenance:
            registration:
                expiration_timeout:           24h
                check_frequency:              1h
                batch_limit:                  500
            reset_password:
                expiration_timeout:           15m
                check_frequency:              15m
                batch_limit:                  500

        {{- if .Values.controller.extraConfig }}
        {{- toYaml .Values.controller.extraConfig | nindent 8 }}
        {{- end }}

