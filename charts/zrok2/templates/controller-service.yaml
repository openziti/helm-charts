apiVersion: v1
kind: Service
metadata:
  name: {{ include "zrok2.fullname" . }}
  labels:
    {{- include "zrok2.labelsController" . | nindent 4 }}
spec:
  type: {{ .Values.controller.service.type }}
  ports:
    - port: {{ .Values.controller.service.advertisedPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "zrok2.selectorLabelsController" . | nindent 4 }}
