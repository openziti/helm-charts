apiVersion: v1
kind: Service
metadata:
  name: {{ include "zrok2.fullname" . }}-frontend
  labels:
    {{- include "zrok2.labelsFrontend" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.advertisedPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "zrok2.selectorLabelsFrontend" . | nindent 4 }}
